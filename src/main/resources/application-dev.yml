server:
  shutdown: immediate

api:
  base:
    url:
      oauth: http://localhost:9090/auth
      prison: http://localhost:8082
      prisoner-search: http://localhost:8083
      locations: http://localhost:8085
      case-notes: http://localhost:8086

management.endpoint:
  health.cache.time-to-live: 0
  info.cache.time-to-live: 0

spring:

  flyway:
    url: jdbc:postgresql://localhost:5432/incentives?sslmode=prefer
    user: incentives
    password: incentives

  r2dbc:
    url: r2dbc:postgresql://localhost:5432/incentives?sslmode=prefer
    username: incentives
    password: incentives
    properties:
      sslMode: DISABLE
      sslRootCert:
